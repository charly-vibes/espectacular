pre-commit:
# ah:managed:start
  ah-check:
    run: ah check
# ah:managed:end

  parallel: true
  commands:
    fmt-check:
      run: cargo fmt -- --check
    check:
      run: cargo check

pre-push:
  parallel: true
  commands:
    lint:
      run: cargo clippy -- -D warnings
    test:
      # Run only affected tests via testaruda (falls back to full cargo test)
      run: testaruda-pre-push
